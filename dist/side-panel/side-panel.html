<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>PromptMaster</title><style>* { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #ffffff;
      --bg-secondary: #f7f7f5;
      --bg-tertiary: #efefef;
      --bg-hover: #f0f0ef;
      --bg-selected: #e8e8e6;
      --text-primary: #37352f;
      --text-secondary: #787775;
      --text-placeholder: #b4b4b0;
      --accent: #2e86de;
      --accent-hover: #1a6fc4;
      --accent-light: #e8f2fb;
      --border: #e3e2e0;
      --border-light: #f0efed;
      --success: #0f7b6c;
      --warning: #b35a00;
      --shadow: rgba(0,0,0,0.08);
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.04);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.08);
      --radius-sm: 4px;
      --radius-md: 6px;
      --radius-lg: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      width: 380px;
      height: 640px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      font-size: 14px;
      line-height: 1.5;
    }

    /* Header */
    .header {
      flex-shrink: 0;
      padding: 12px 16px;
      border-bottom: 1px solid var(--border-light);
      background: var(--bg-primary);
    }

    .header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .header h1 {
      font-size: 15px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .header-actions {
      display: flex;
      gap: 4px;
    }

    .icon-btn {
      width: 28px;
      height: 28px;
      border: none;
      background: transparent;
      border-radius: var(--radius-sm);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      transition: background 0.15s, color 0.15s;
    }

    .icon-btn:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    /* Search Input with Tags */
    .search-container {
      position: relative;
    }

    .search-input-wrapper {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      background: var(--bg-secondary);
      min-height: 36px;
      align-items: center;
      cursor: text;
      transition: border-color 0.15s, box-shadow 0.15s;
    }

    .search-input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-light);
    }

    .tag-chip {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 8px;
      background: var(--accent-light);
      color: var(--accent);
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .tag-chip .remove {
      cursor: pointer;
      opacity: 0.7;
      font-size: 10px;
    }

    .tag-chip .remove:hover {
      opacity: 1;
    }

    .search-input {
      flex: 1;
      min-width: 60px;
      border: none;
      background: transparent;
      color: var(--text-primary);
      font-size: 14px;
      outline: none;
    }

    .search-input::placeholder {
      color: var(--text-placeholder);
    }

    /* Tag Dropdown */
    .tag-dropdown {
      position: absolute;
      top: 100%;
      left: 0;
      right: 0;
      background: var(--bg-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      max-height: 320px;
      overflow-y: auto;
      z-index: 100;
      display: none;
      margin-top: 4px;
    }

    .tag-dropdown.active {
      display: block;
    }

    .tag-dropdown-section {
      padding: 6px 0;
      border-bottom: 1px solid var(--border-light);
    }

    .tag-dropdown-section:last-child {
      border-bottom: none;
    }

    .tag-dropdown-title {
      padding: 4px 12px;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
    }

    .tag-dropdown-item {
      padding: 8px 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      transition: background 0.1s;
    }

    .tag-dropdown-item:hover {
      background: var(--bg-hover);
    }

    .tag-dropdown-item .tag-name {
      font-size: 13px;
      color: var(--text-primary);
    }

    .tag-dropdown-item .tag-count {
      font-size: 11px;
      color: var(--text-placeholder);
    }

    .tag-dropdown-add {
      padding: 8px 12px;
      color: var(--accent);
      font-size: 13px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tag-dropdown-add:hover {
      background: var(--accent-light);
    }

    .tag-dropdown-empty {
      padding: 16px;
      text-align: center;
      color: var(--text-secondary);
      font-size: 13px;
    }

    /* Folder Section */
    .folders-section {
      flex-shrink: 0;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-light);
      background: var(--bg-secondary);
      max-height: 100px;
      overflow-y: auto;
    }

    .folder-section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .section-title {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .add-folder-btn {
      font-size: 11px;
      color: var(--accent);
      background: none;
      border: none;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: var(--radius-sm);
      transition: background 0.1s;
    }

    .add-folder-btn:hover {
      background: var(--accent-light);
    }

    .folder-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .folder-item {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 8px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 13px;
      color: var(--text-secondary);
      transition: background 0.1s, color 0.1s;
    }

    .folder-item:hover {
      background: var(--bg-hover);
      color: var(--text-primary);
    }

    .folder-item.active {
      background: var(--bg-selected);
      color: var(--text-primary);
      font-weight: 500;
    }

    .folder-item-count {
      margin-left: auto;
      font-size: 11px;
      color: var(--text-placeholder);
    }

    /* Prompt List */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      min-height: 0;
    }

    .prompt-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .prompt-card {
      background: var(--bg-primary);
      border: 1px solid var(--border-light);
      border-radius: var(--radius-md);
      padding: 10px 12px;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;
    }

    .prompt-card:hover {
      border-color: var(--border);
      box-shadow: var(--shadow-sm);
      transform: translateY(-1px);
    }

    .prompt-card.selected {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }

    .prompt-card-header {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 4px;
    }

    .prompt-title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text-primary);
      flex: 1;
    }

    .prompt-favorite {
      color: var(--text-placeholder);
      font-size: 14px;
      cursor: pointer;
      transition: color 0.15s;
      padding: 2px 4px;
    }

    .prompt-favorite:hover, .prompt-favorite.active {
      color: #f59e0b;
    }

    .prompt-preview {
      font-size: 12px;
      color: var(--text-secondary);
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      line-height: 1.4;
    }

    .prompt-tags {
      display: flex;
      gap: 4px;
      margin-top: 8px;
      flex-wrap: wrap;
    }

    .tag {
      font-size: 10px;
      padding: 2px 6px;
      background: var(--bg-tertiary);
      border-radius: 3px;
      color: var(--text-secondary);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-secondary);
    }

    .empty-state svg {
      width: 40px;
      height: 40px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* Variable Panel */
    .variable-panel {
      flex-shrink: 0;
      background: var(--bg-secondary);
      border-top: 1px solid var(--border);
      padding: 16px;
      display: none;
      max-height: 320px;
      overflow-y: auto;
    }

    .variable-panel.active {
      display: block;
    }

    .variable-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .variable-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text-primary);
    }

    .close-btn {
      width: 24px;
      height: 24px;
      border: none;
      background: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .close-btn:hover {
      background: var(--bg-hover);
    }

    .variable-item {
      margin-bottom: 12px;
    }

    .variable-item label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 4px;
    }

    .variable-item input,
    .variable-item select,
    .variable-item textarea {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      background: var(--bg-primary);
      color: var(--text-primary);
      font-size: 13px;
      font-family: inherit;
      resize: vertical;
    }

    .variable-item input:focus,
    .variable-item select:focus,
    .variable-item textarea:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-light);
    }

    .variable-hint {
      font-size: 10px;
      color: var(--text-placeholder);
      margin-top: 2px;
    }

    .actions {
      display: flex;
      gap: 8px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }

    .btn:hover { opacity: 0.9; }
    .btn:active { transform: scale(0.98); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .btn-secondary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    .btn-primary {
      background: var(--accent);
      color: white;
    }

    .btn-primary:hover {
      background: var(--accent-hover);
    }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--success);
      color: white;
      padding: 10px 16px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      z-index: 1000;
      box-shadow: var(--shadow-md);
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-placeholder); }</style></head><body><div class="header"><div class="header-top"><h1>📋 PromptMaster</h1><div class="header-actions"><button class="icon-btn" id="addFolderBtn" title="新建文件夹"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg></button> <button class="icon-btn" id="addPromptBtn" title="新建提示词"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button></div></div><div class="search-container"><div class="search-input-wrapper" id="searchWrapper"><input class="search-input" id="search" placeholder="搜索或输入标签..." autocomplete="off"/></div><div class="tag-dropdown" id="dropdown"></div></div></div><div class="folders-section"><div class="folder-section-header"><span class="section-title">文件夹</span> <button class="add-folder-btn" id="addFolderBtn2">+ 新建</button></div><div class="folder-list" id="folderList"><div class="folder-item active" data-folder="all">📋 全部 <span class="folder-item-count" id="allCount">0</span></div><div class="folder-item" data-folder="favorites">⭐ 收藏 <span class="folder-item-count" id="favCount">0</span></div></div></div><div class="main-content"><div class="section-title" style="margin-bottom: 8px;">提示词模板</div><div class="prompt-list" id="promptList"><div class="empty-state"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg><p>加载中...</p></div></div></div><div class="variable-panel" id="variablePanel"><div class="variable-header"><span class="variable-title">填写变量</span> <button class="close-btn" id="closePanel">✕</button></div><div id="variableInputs"></div><div class="actions"><button class="btn btn-secondary" id="cancelBtn">取消</button> <button class="btn btn-primary" id="copyBtn">复制</button></div></div><div class="toast" id="toast"></div><div style="position:fixed;bottom:0;left:0;right:0;background:#000;color:#0f0;font-size:11px;padding:8px;max-height:200px;overflow-y:auto;display:none;" id="debugPanel"><div style="margin-bottom:4px;font-weight:bold;">[DEBUG]</div><div id="debugContent"></div></div><button onclick="toggleDebug()" style="position:fixed;bottom:5px;right:5px;font-size:10px;padding:2px 6px;background:#333;color:#fff;border:none;border-radius:3px;cursor:pointer;">DEBUG</button><script src="side-panel.js"></script><script>function toggleDebug() {
